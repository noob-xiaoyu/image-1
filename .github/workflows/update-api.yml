name: Update API & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'bg/**'            # 新增/删除图片时触发
      - 'scripts/**'       # 扫描脚本变更时触发
      - 'src/**'           # Vue 源码变更时触发
      - 'index.html'
      - 'package.json'
      - 'vite.config.js'
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: write          # 允许推送回 main 和 gh-pages 分支

jobs:
  update-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scan script
        run: node scripts/scan.js

      - name: Build Vue app
        run: npm run build

      - name: Prepare deploy directory
        run: |
          cp -r bg dist/
          cp -r api dist/
          cp manifest.json dist/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true

      - name: Commit & push API changes to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 暂存 API 生成的文件
          git add manifest.json api/ scripts/scan.js

          # 只有有变更时才提交
          if git diff --staged --quiet; then
            echo "No API changes to commit."
          else
            git commit -m "Auto-update API files [skip ci]"
            git push
          fi
