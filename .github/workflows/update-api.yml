name: Update API & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'bg/**'            # 新增/删除图片时触发
      - 'scripts/**'       # 扫描脚本变更时触发
      - 'index.html'
      - 'gallery.css'
      - 'gallery.js'
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: write          # 允许推送回 main 分支

jobs:
  update-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scan script
        run: node scripts/scan.js

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 暂存 API 生成的文件
          git add manifest.json api/ scripts/scan.js

          # 只有有变更时才提交
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 Auto-update API files [skip ci]"
            git push
          fi
