<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图库 Gallery — Pixiv Wallpapers</title>
  <meta name="description" content="PC 和手机壁纸图库，图片来自 Pixiv。支持随机壁纸 API。">
  <link rel="stylesheet" href="gallery.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-title">
      <span class="icon">🖼️</span>
      <span>图库 Gallery</span>
    </div>
    <div class="header-right">
      <div class="tabs" id="tabs" role="tablist">
        <!-- JS 动态生成 -->
      </div>
      <button class="btn-random" id="btn-random" title="随机一张壁纸">
        🎲 随机
      </button>
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <div id="loader" class="loader">
      <div class="loader-spinner"></div>
      <span>加载中...</span>
    </div>
    <div class="gallery-grid" id="gallery-grid">
      <!-- JS 动态生成 -->
    </div>
    <p style="text-align:center;padding:16px;color:var(--text-muted);font-size:0.85rem">
      共 <span id="count-text">0 张</span> | 图片来自 Pixiv
    </p>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-label="图片查看器">
    <button class="lightbox-close" aria-label="关闭">✕</button>
    <button class="lightbox-nav prev" aria-label="上一张">‹</button>
    <button class="lightbox-nav next" aria-label="下一张">›</button>
    <div class="lightbox-img-wrap">
      <img class="lightbox-img" src="" alt="">
    </div>
    <div class="lightbox-info">
      <!-- JS 动态填充 -->
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>API: <a href="api/pc.txt">api/pc.txt</a> · <a href="api/phone.txt">api/phone.txt</a> · <a href="api/all.txt">api/all.txt</a> · <a href="manifest.json">manifest.json</a></p>
  </footer>

  <script src="gallery.js"></script>
</body>
</html>
